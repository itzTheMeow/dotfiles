name: Format Code
on: [push]

jobs:
  format:
    runs-on: node
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@v30

      - name: Run Formatter
        run: nix run .#format --accept-flake-config

      - name: Commit Changes
        uses: https://github.com/stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: format code"
