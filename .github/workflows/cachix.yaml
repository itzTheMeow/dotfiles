name: "Build All NixOS Systems"
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-systems:
    runs-on: ubuntu-latest
    strategy:
      matrix: # list of hostnames to cache for
        hostname: [flynn]
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: xelacodes
          # Use signingKey instead of authToken
          signingKey: "${{ secrets.CACHIX_PRIVATE_KEY }}"

      - name: Build System
        run: |
          nix build .#nixosConfigurations.${{ matrix.hostname }}.config.system.build.toplevel \
            --extra-conf 'accept-flake-config = true'
