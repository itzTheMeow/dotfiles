name: Format Code
on: [push]

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Run Formatter
        run: nix run .#format

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: format code"
